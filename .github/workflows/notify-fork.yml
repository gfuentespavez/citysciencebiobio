name: Notify fork to sync

on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fork sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.CITYLAB_PAT }}" \
            https://api.github.com/repos/citylab-biobio/citysciencebiobio/dispatches \
            -d '{"event_type":"upstream-push"}'
