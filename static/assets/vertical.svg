  <defs>
    <style>
      .cls-1 {
        stroke: #ffcb05;
      }

      .cls-1, .cls-2, .cls-3 {
        fill: none;
        stroke-linecap: round;
        stroke-miterlimit: 10;
        stroke-width: 5px;
      }

      .cls-2 {
        stroke: #fa0;
      }

      .cls-4 {
        fill: #ffcb05;
      }

      .cls-5 {
        fill: #fa0;
      }

      .cls-6 {
        fill: #b9bece;
      }

      .cls-3 {
        stroke: #b9bece;
      }

      @keyframes fl-a {
        0%,100% { opacity: 1;   }
        42%     { opacity: .48; }
        47%     { opacity: .95; }
        78%     { opacity: .6;  }
        82%     { opacity: 1;   }
      }
      @keyframes fl-b {
        0%,100% { opacity: .92; }
        22%     { opacity: .42; }
        27%     { opacity: .88; }
        62%     { opacity: .55; }
        66%     { opacity: .88; }
      }
      @keyframes fl-dot {
        0%,100% { opacity: 1;   }
        50%     { opacity: .52; }
      }

      /* Irrational durations — slow breathing, classes drift out-of-phase */
      .cls-1 { animation: fl-a    5.3s ease-in-out infinite; }
      .cls-2 { animation: fl-b    7.1s ease-in-out infinite 1.8s; }
      .cls-3 { animation: fl-a    8.9s ease-in-out infinite 3.1s; }
      .cls-4 { animation: fl-dot  4.9s ease-in-out infinite; }
      .cls-5 { animation: fl-dot  6.3s ease-in-out infinite 2.1s; }
      .cls-6 { animation: fl-dot  9.1s ease-in-out infinite 4.4s; }

      @media (prefers-reduced-motion: reduce) {
        .cls-1, .cls-2, .cls-3,
        .cls-4, .cls-5, .cls-6 { animation: none; }
      }
    </style>
  </defs>
